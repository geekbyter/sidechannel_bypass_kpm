name: Build sidechannel_bypass KPM

on:
  push:
    branches: [ "main" ]
    paths:
      - "sidechannel_bypass_kpm/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "sidechannel_bypass_kpm/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout KernelPatch SDK
        uses: actions/checkout@v4
        with:
          repository: bmax121/KernelPatch
          path: _kp
          fetch-depth: 1

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29

      - name: Build
        env:
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
          KP_DIR: ${{ github.workspace }}/_kp
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidechannel_bypass_kpm
          path: "*.kpm"
